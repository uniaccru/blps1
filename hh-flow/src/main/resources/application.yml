server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:lSZph2RMzXGle72b2Of79cEtRkVZ3PM8lIqNyFDRHE4Fjd+FJwrdBPW/qGc8X9mg}
  expiration: 15m
  refresh-expiration: 7d

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  
  # JNDI DataSource configuration for WildFly
  datasource:
    jndi-name: java:/PostgresDS
  
  # JPA/Hibernate configuration for WildFly with managed transactions
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    
  # Transaction management - use JTA
  jta:
    log-dir: ${jboss.server.log.dir:./logs}
    enabled: true
  
  sql:
    init:
      mode: always
  
  jackson:
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

hh:
  email:
    queue: employer.application.email
    from: ${MAIL_FROM:noreply@hhflow.local}
  outbox:
    poll-interval-ms: 5000
    batch-size: 50
    max-retries: 5

demo:
  # Set this to a vacancy ID to force a rollback after notification save.
  # Use -1 to keep the demo rollback disabled.
  rollback-vacancy-id: 2
