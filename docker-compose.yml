services:
  postgres:
    image: postgres:16
    container_name: hh-flow-postgres
    environment:
      POSTGRES_DB: hh_flow
      POSTGRES_USER: hh_user
      POSTGRES_PASSWORD: hh_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hh_user -d hh_flow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hh-flow-rabbitmq
    hostname: rabbitmq
    user: "999:999"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: hh-flow-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  odoo-db:
    image: postgres:15
    container_name: hh-flow-odoo-db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo:
    image: odoo:17.0
    container_name: hh-flow-odoo
    depends_on:
      odoo-db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo
    command: >
      odoo --db_host=odoo-db --db_user=odoo --db_password=odoo
           -d odoo -i hr_recruitment --without-demo=all
    volumes:
      - odoo_data:/var/lib/odoo

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hh-flow-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
      odoo:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hh_flow
      DB_USER: hh_user
      DB_PASSWORD: hh_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@hhflow.local
      ODOO_URL: http://odoo:8069
      ODOO_DB: odoo
      ODOO_USER: admin
      ODOO_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  odoo_db_data:
  odoo_data:
