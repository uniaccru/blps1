version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: hh-flow-postgres
    environment:
      POSTGRES_DB: hh_flow
      POSTGRES_USER: hh_user
      POSTGRES_PASSWORD: hh_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hh_user -d hh_flow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hh-flow-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hh_flow
      DB_USER: hh_user
      DB_PASSWORD: hh_password
    ports:
      - "8080:8080"

volumes:
  postgres_data:
