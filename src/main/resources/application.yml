server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:lSZph2RMzXGle72b2Of79cEtRkVZ3PM8lIqNyFDRHE4Fjd+FJwrdBPW/qGc8X9mg}
  expiration: 15m
  refresh-expiration: 7d

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hh_flow}
    username: ${DB_USER:hh_user}
    password: ${DB_PASSWORD:hh_password}
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: always
  jackson:
    serialization:
      write-dates-as-timestamps: false
