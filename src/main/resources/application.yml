server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:lSZph2RMzXGle72b2Of79cEtRkVZ3PM8lIqNyFDRHE4Fjd+FJwrdBPW/qGc8X9mg}
  expiration: 15m
  refresh-expiration: 7d

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  
  # JNDI DataSource configuration for WildFly
  datasource:
    jndi-name: java:/PostgresDS
  
  # JPA/Hibernate configuration for WildFly with managed transactions
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQL10Dialect
    hibernate:
      ddl-auto: create
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    
  # Transaction management - use JTA
  jta:
    log-dir: ${jboss.server.log.dir:./logs}
    enabled: true
  
  sql:
    init:
      mode: always
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
