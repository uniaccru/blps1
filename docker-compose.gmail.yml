# Overlay для реального Gmail вместо MailHog.
# Использование:
#   cp .env.gmail.example .env.gmail   # заполнить GMAIL_APP_PASSWORD
#   docker compose --env-file .env.gmail -f docker-compose.yml -f docker-compose.gmail.yml up --build
#
# Email получателя = email работодателя вакансии в БД.
# Зарегистрируйте работодателя с stolnaya.stella@gmail.com через Insomnia
# или укажите EXPECTED_TO при ручной проверке.

services:
  app:
    environment:
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${GMAIL_USERNAME}
      MAIL_PASSWORD: ${GMAIL_APP_PASSWORD}
      MAIL_FROM: ${GMAIL_USERNAME}
      MAIL_SMTP_AUTH: "true"
      MAIL_SMTP_STARTTLS: "true"
